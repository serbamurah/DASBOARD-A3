<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT. A3 | Financial Control System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 'serif': ['"Playfair Display"', 'serif'], 'sans': ['Montserrat', 'sans-serif'] },
                    colors: { 
                        navy: { 900: '#050c1a', DEFAULT: '#020c1b' }, 
                        gold: { 400: '#f0ce75', 500: '#c5a044' },
                        expense: '#ef4444',
                        profit: '#10b981'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #020c1b; color: #e5e7eb; overflow-x: hidden; }
        .marble-overlay { background-image: url('https://www.transparenttextures.com/patterns/white-marble.png'); opacity: 0.04; pointer-events: none; }
        .luxury-glass { background: rgba(5, 12, 26, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(197, 160, 68, 0.2); }
        .nav-btn.active { background: #c5a044 !important; color: #020c1b !important; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #c5a044; border-radius: 10px; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .shake { animation: shake 0.2s ease-in-out 0s 2; }
    </style>
</head>
<body class="font-sans relative">

    <div class="fixed inset-0 marble-overlay z-0"></div>

    <main class="relative z-10 max-w-7xl mx-auto p-4 md:p-10">
        
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div class="flex items-center gap-5">
                <div class="relative w-16 h-16 md:w-20 md:h-20 bg-navy-900 border border-gold-500/30 rounded-full flex items-center justify-center overflow-hidden shadow-2xl">
                    <img src="logo.png" alt="Logo" onerror="this.style.display='none'; document.getElementById('logoFallback').style.opacity='1'" class="w-full h-full object-contain p-2">
                    <div id="logoFallback" class="absolute inset-0 flex items-center justify-center font-serif font-bold text-2xl text-gold-500 opacity-0">A3</div>
                </div>
                <div>
                    <h1 class="font-serif text-3xl md:text-4xl text-white">Financial <span class="text-gold-500 italic">Report</span></h1>
                    <p class="text-[10px] tracking-[0.4em] uppercase text-gold-500/60 font-bold">PT. A3 Management System</p>
                </div>
            </div>

            <div class="flex flex-wrap justify-center items-center gap-3">
                <div id="systemStatus" class="flex items-center gap-2 px-3 py-1 bg-navy-900 border border-gold-500/10 rounded-full text-[9px] font-bold uppercase tracking-widest text-gray-500">
                    <div class="w-1.5 h-1.5 rounded-full bg-gray-500" id="statusDot"></div>
                    <span id="statusText">Menghubungkan...</span>
                </div>
                <div class="flex bg-navy-900 border border-gold-500/20 p-1 rounded shadow-lg">
                    <button onclick="switchView('yearly')" id="navYearly" class="nav-btn active px-4 py-1.5 text-[10px] font-bold uppercase rounded transition-all">Tahunan</button>
                    <button onclick="switchView('monthly')" id="navMonthly" class="nav-btn px-4 py-1.5 text-[10px] font-bold uppercase rounded transition-all">Bulanan</button>
                    <button onclick="switchView('daily')" id="navDaily" class="nav-btn px-4 py-1.5 text-[10px] font-bold uppercase rounded transition-all">Harian</button>
                </div>
                <select id="selYear" onchange="handleYearChange()" class="bg-navy-900 border border-gold-500/30 text-gold-500 px-3 py-1.5 rounded text-xs outline-none cursor-pointer"></select>
                <button onclick="requestAuth()" class="luxury-glass p-2 rounded text-gold-500 hover:bg-gold-500 hover:text-navy-900 transition-colors">
                    <i class="ph ph-lock-key text-lg"></i>
                </button>
            </div>
        </div>

        <!-- KPI Summary -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="luxury-glass p-4 rounded-sm border-t-2 border-gold-500 text-center">
                <p class="text-[9px] font-bold text-gray-500 uppercase mb-1 tracking-widest">Total Omset</p>
                <p id="kpiOmset" class="text-lg md:text-xl font-serif text-white truncate italic">Rp 0</p>
            </div>
            <div class="luxury-glass p-4 rounded-sm border-t-2 border-expense text-center">
                <p class="text-[9px] font-bold text-gray-500 uppercase mb-1 tracking-widest">Total Beban</p>
                <p id="kpiPengeluaran" class="text-lg md:text-xl font-serif text-expense truncate italic">Rp 0</p>
            </div>
            <div class="bg-gold-500/10 border border-gold-500/30 p-4 rounded-sm border-t-2 border-gold-500 text-center">
                <p class="text-[9px] font-black text-gold-500 uppercase mb-1 tracking-widest">Laba Bersih</p>
                <p id="kpiHasil" class="text-xl md:text-2xl font-serif font-black text-gold-500 truncate italic">Rp 0</p>
            </div>
            <div class="luxury-glass p-4 rounded-sm border-t-2 border-blue-400 text-center">
                <p class="text-[9px] font-bold text-gray-500 uppercase mb-1 tracking-widest">Stok Barang</p>
                <p id="kpiStock" class="text-lg md:text-xl font-serif text-blue-400 truncate italic">0 Unit</p>
            </div>
        </div>

        <!-- Filters -->
        <div id="filterContainer" class="hidden mb-8 space-y-4">
            <div class="luxury-glass p-5 rounded-sm">
                <div class="flex flex-wrap justify-center gap-2" id="monthSelector"></div>
            </div>
            <div id="dailyFilters" class="hidden luxury-glass p-5 rounded-sm overflow-x-auto custom-scrollbar">
                <div class="flex gap-1.5 min-w-max mx-auto" id="daySelector"></div>
            </div>
        </div>

        <!-- Chart -->
        <div class="luxury-glass p-6 rounded-sm h-[350px] mb-10">
            <canvas id="barChart"></canvas>
        </div>

        <!-- Daftar Toko & Rangking -->
        <div id="storeGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-10"></div>

    </main>

    <!-- Modals -->
    <div id="authPanel" class="fixed inset-0 bg-navy-900/95 z-[100] hidden flex items-center justify-center p-4 backdrop-blur-xl">
        <div class="luxury-glass p-8 max-w-sm w-full text-center">
            <h3 class="font-serif text-xl text-white italic mb-6">Akses Sistem</h3>
            <input type="password" id="passkeyInput" placeholder="Passkey" class="w-full bg-navy-900 border border-gold-500/30 p-3 text-center text-white outline-none rounded mb-4 focus:border-gold-500 tracking-[0.5em]">
            <button onclick="verifyPasskey()" class="w-full bg-gold-500 text-navy-900 py-3 font-bold uppercase text-xs tracking-widest">Akses</button>
            <button onclick="closeAuth()" class="mt-4 text-gray-500 text-[10px] uppercase font-bold tracking-widest">Batal</button>
        </div>
    </div>

    <!-- Config Cloud -->
    <div id="configPanel" class="fixed inset-0 bg-navy-900 z-[110] hidden flex items-center justify-center p-4">
        <div class="luxury-glass p-6 md:p-10 max-w-4xl w-full border-gold-500 max-h-[90vh] flex flex-col relative overflow-hidden">
            <button onclick="toggleConfig()" class="absolute top-6 right-6 text-gray-500 hover:text-white"><i class="ph ph-x text-2xl"></i></button>
            <h3 class="font-serif text-2xl text-white italic mb-8">Pusat Data (Cloud)</h3>
            
            <div id="monthlyInputs" class="grid grid-cols-1 md:grid-cols-3 gap-4 overflow-y-auto pr-2 custom-scrollbar flex-1"></div>
            
            <button id="btnSaveLinks" onclick="saveAllLinks()" class="mt-8 bg-gold-500 text-navy-900 py-4 font-bold uppercase text-[10px] tracking-[0.3em]">Simpan Online</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CONFIG FIREBASE (Sama seperti sebelumnya)
        const myFirebaseConfig = {
            apiKey: "AIzaSyAsNS3WCF93AFGmagrlRdsGvMEORqhI0YI",
            authDomain: "pta3-dasboard.firebaseapp.com",
            projectId: "pta3-dasboard",
            storageBucket: "pta3-dasboard.firebasestorage.app",
            messagingSenderId: "245278785511",
            appId: "1:245278785511:web:9db97ddb27e3841838c742"
        };

        const appId = 'pta3-dashboard';
        const bulanList = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        const yearsSupported = ["2024", "2025", "2026"];

        let app, auth, db, user;
        let globalDataCache = {};
        let cloudLinks = {};
        let currentView = 'yearly';
        let selMonth = bulanList[new Date().getMonth()];
        let selDay = new Date().getDate();
        let barChartInst = null;

        const formatIDR = (v) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(v || 0);
        const cleanNum = (v) => parseFloat(String(v).replace(/[^0-9.-]/g, '')) || 0;
        const getColumnValue = (row, keywords) => { const key = Object.keys(row).find(k => keywords.some(kw => k.toLowerCase().trim().includes(kw))); return key ? row[key] : null; };

        // INIT FIREBASE
        app = initializeApp(myFirebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);

        signInAnonymously(auth);
        onAuthStateChanged(auth, (u) => {
            user = u;
            if(user) {
                document.getElementById('statusText').innerText = "Online (Terhubung)";
                document.getElementById('statusDot').className = "w-1.5 h-1.5 rounded-full bg-profit shadow-[0_0_8px_#10b981]";
                setupListeners();
            }
        });

        function setupListeners() {
            const year = document.getElementById('selYear').value;
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'config', year), (snap) => {
                if(snap.exists()) {
                    cloudLinks[year] = snap.data().links || {};
                    loadData();
                }
            });
        }

        async function loadData() {
            const year = document.getElementById('selYear').value;
            const yearLinks = cloudLinks[year] || {};
            
            for (let m of bulanList) {
                if (yearLinks[m] && !globalDataCache[`${year}_${m}`]) {
                    await fetchCSV(year, m, yearLinks[m]);
                }
            }
            renderAll();
        }

        async function fetchCSV(year, month, url) {
            try {
                const res = await fetch(url + (url.includes('?') ? '&' : '?') + 'cache=' + Date.now());
                const text = await res.text();
                const wb = XLSX.read(text, { type: 'string' });
                const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                
                globalDataCache[`${year}_${month}`] = json.map(r => ({
                    toko: String(getColumnValue(r, ['toko', 'nama', 'store']) || 'Unknown'),
                    omset: cleanNum(getColumnValue(r, ['omset', 'revenue', 'jual'])),
                    beban: cleanNum(getColumnValue(r, ['beban', 'pengeluaran', 'expense', 'biaya'])),
                    stok: cleanNum(getColumnValue(r, ['stok', 'stock', 'unit'])),
                    tgl: parseInt(getColumnValue(r, ['tanggal', 'tgl', 'date'])) || 1
                }));
            } catch (e) { console.error("Gagal memuat:", month, e); }
        }

        function renderAll() {
            const year = document.getElementById('selYear').value;
            let data = [];
            
            if (currentView === 'yearly') {
                Object.keys(globalDataCache).forEach(k => { if(k.startsWith(year)) data = [...data, ...globalDataCache[k]]; });
            } else {
                data = globalDataCache[`${year}_${selMonth}`] || [];
            }
            if (currentView === 'daily') data = data.filter(d => d.tgl === selDay);

            const agg = {};
            let tO = 0, tB = 0, tS = 0;
            data.forEach(d => {
                if (!agg[d.toko]) agg[d.toko] = { o:0, b:0, s:0 };
                agg[d.toko].o += d.omset; agg[d.toko].b += d.beban; agg[d.toko].s = d.stok;
                tO += d.omset; tB += d.beban;
            });
            Object.values(agg).forEach(v => tS += v.s);

            document.getElementById('kpiOmset').innerText = formatIDR(tO);
            document.getElementById('kpiPengeluaran').innerText = formatIDR(tB);
            document.getElementById('kpiHasil').innerText = formatIDR(tO - tB);
            document.getElementById('kpiStock').innerText = tS.toLocaleString() + ' Unit';

            renderGrid(agg);
        }

        // =========================================================================
        // PERBAIKAN: RANGKING & TANPA EFISIENSI O VS P
        // =========================================================================
        function renderGrid(agg) {
            const grid = document.getElementById('storeGrid');
            
            // Urutkan berdasarkan Omset (o) Terbesar
            const stores = Object.keys(agg).map(k => ({ 
                name: k, 
                ...agg[k], 
                h: agg[k].o - agg[k].b 
            })).sort((a,b) => b.o - a.o); 
            
            grid.innerHTML = stores.length ? stores.map((s, index) => `
                <div class="luxury-glass p-6 rounded-sm border-l-4 ${s.h < 0 ? 'border-expense' : 'border-gold-500'} relative overflow-hidden">
                    <!-- LABEL RANKING -->
                    <div class="absolute top-0 right-0 bg-gold-500 text-navy-900 px-3 py-1 font-black text-[10px] italic z-10 shadow-lg">
                        RANK #${index + 1}
                    </div>

                    <h4 class="font-serif text-white text-lg mb-4 italic pr-12">${s.name}</h4>
                    
                    <div class="space-y-2 text-[10px] font-bold uppercase tracking-widest">
                        <div class="flex justify-between">
                            <span>Omset</span>
                            <span class="text-white">${formatIDR(s.o)}</span>
                        </div>
                        <div class="flex justify-between text-expense">
                            <span>Beban</span>
                            <span>-${formatIDR(s.b)}</span>
                        </div>
                        <div class="flex justify-between text-blue-400">
                            <span>Stok</span>
                            <span>${s.s} Unit</span>
                        </div>
                        
                        <div class="flex justify-between pt-3 mt-2 border-t border-white/10 ${s.h < 0 ? 'text-expense' : 'text-gold-500'} text-xs">
                            <span>Laba Bersih</span>
                            <span class="font-bold">${formatIDR(s.h)}</span>
                        </div>
                    </div>
                </div>
            `).join('') : '<div class="col-span-full py-10 text-center text-gray-500 text-xs italic">Data Kosong...</div>';
            
            updateChart(stores);
        }

        function updateChart(stores) {
            const ctx = document.getElementById('barChart').getContext('2d');
            if (barChartInst) barChartInst.destroy();
            barChartInst = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: stores.slice(0, 10).map(s => s.name),
                    datasets: [{ label: 'Omset', data: stores.slice(0, 10).map(s => s.o), backgroundColor: '#c5a044' }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { ticks: { color: '#666' } }, x: { ticks: { color: '#666' } } } }
            });
        }

        // GLOBAL EXPORTS
        window.switchView = (v) => {
            currentView = v;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.id === 'nav' + v.charAt(0).toUpperCase() + v.slice(1)));
            document.getElementById('filterContainer').classList.toggle('hidden', v === 'yearly');
            document.getElementById('dailyFilters').classList.toggle('hidden', v !== 'daily');
            window.initSelectors(); renderAll();
        };

        window.initSelectors = () => {
            document.getElementById('monthSelector').innerHTML = bulanList.map(m => `<button onclick="window.setMonth('${m}')" class="px-4 py-1.5 text-[9px] border border-gold-500/20 rounded ${selMonth===m ? 'bg-gold-500 text-navy-900' : 'text-gray-500'}">${m.toUpperCase()}</button>`).join('');
            let dH = ''; for(let i=1; i<=31; i++) dH += `<button onclick="window.setDay(${i})" class="w-8 h-8 text-[9px] border border-gold-500/20 rounded ${selDay===i ? 'bg-gold-500 text-navy-900' : 'text-gray-500'}">${i}</button>`;
            document.getElementById('daySelector').innerHTML = dH;
        };

        window.setMonth = (m) => { selMonth = m; window.initSelectors(); renderAll(); };
        window.setDay = (d) => { selDay = d; window.initSelectors(); renderAll(); };
        window.handleYearChange = () => { globalDataCache = {}; setupListeners(); };
        window.requestAuth = () => document.getElementById('authPanel').classList.remove('hidden');
        window.closeAuth = () => document.getElementById('authPanel').classList.add('hidden');
        window.verifyPasskey = () => { if(document.getElementById('passkeyInput').value === 'A3MANAGER') { window.closeAuth(); window.toggleConfig(); } };
        window.toggleConfig = () => { document.getElementById('configPanel').classList.toggle('hidden'); window.renderConfigUI(); };
        
        window.renderConfigUI = () => {
            const year = document.getElementById('selYear').value;
            const saved = cloudLinks[year] || {};
            document.getElementById('monthlyInputs').innerHTML = bulanList.map(m => `
                <div class="bg-navy-900 p-4 border border-white/5 rounded">
                    <label class="text-[9px] text-gold-500 font-bold uppercase mb-2 block">${m}</label>
                    <input id="link_${m}" value="${saved[m]||''}" placeholder="Link CSV" class="w-full bg-transparent border-b border-gold-500/20 text-xs text-white outline-none">
                </div>
            `).join('');
        };

        window.saveAllLinks = async () => {
            const year = document.getElementById('selYear').value;
            const links = {}; bulanList.forEach(m => { const v = document.getElementById(`link_${m}`).value; if(v) links[m] = v; });
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', year), { links });
            window.toggleConfig();
        };

        window.onload = () => {
            const currentYear = String(new Date().getFullYear());
            document.getElementById('selYear').innerHTML = yearsSupported.map(y => `<option value="${y}" ${y===currentYear?'selected':''}>${y}</option>`).join('');
            window.initSelectors();
        };
    </script>
</body>
</html>
